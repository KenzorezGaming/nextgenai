<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SMART KONOHA V1🚀</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/styles/github-dark.min.css">
<script src="https://cdn.jsdelivr.net/gh/highlightjs/cdn-release@11.9.0/build/highlight.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>
:root{
  --konoha:#ff7b00; --chakra:#2575fc; --leaf:#00ff88; --fire:#ff0066;
  --user:#ff7b00; --ai:#f1f1f1; --dark:#0d0d0d;
}
*{box-sizing:border-box}
body{
  margin:0; font-family:system-ui,Arial; color:#111; font-size:16px;
  background:linear-gradient(-45deg,#ff0000,#ff7b00,#ffff00,#00ff00,#0000ff,#8b00ff);
  background-size:600% 600%; animation:bg 8s infinite;
  height:100dvh; display:flex; justify-content:center; align-items:center;
  transition:background 0.5s; overflow:hidden;
}
body.thinking{ animation:bg 2s infinite, chakra-pulse 1s infinite; }
@keyframes bg{
  0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%}
}
@keyframes chakra-pulse{
  0%,100%{filter:brightness(1)} 50%{filter:brightness(1.3)}
}
#loadingScreen{
  position:fixed; top:0; left:0; width:100%; height:100%;
  background:#0d0d0d; z-index:9999; display:flex;
  justify-content:center; align-items:center; flex-direction:column;
  transition:opacity 0.5s, visibility 0.5s;
}
#loadingScreen.hide{ opacity:0; visibility:hidden; }
.loading-content{ text-align:center; color:#fff; }
.loading-title{
  font-size:38px; font-weight:900; color:var(--konoha);
  text-shadow:0 0 20px var(--konoha), 0 0 40px var(--konoha);
  margin-bottom:30px; letter-spacing:2px; animation:glitch 2s infinite;
}
@keyframes glitch{
  0%,100%{transform:translate(0)} 20%{transform:translate(-2px,2px)}
  40%{transform:translate(-2px,-2px)} 60%{transform:translate(2px,2px)}
  80%{transform:translate(2px,-2px)}
}
.loading-bar-container{
  width:320px; height:24px; background:#222; border-radius:12px;
  border:2px solid var(--konoha); overflow:hidden; margin:20px auto;
  box-shadow:0 0 20px var(--konoha);
}
.loading-bar{
  height:100%; width:0%; background:linear-gradient(90deg,var(--konoha),var(--chakra));
  transition:width 0.3s; box-shadow:0 0 10px var(--konoha);
}
.loading-percent{
  font-size:26px; font-weight:700; color:var(--leaf);
  text-shadow:0 0 10px var(--leaf); margin:10px 0;
}
.loading-status{ font-size:16px; color:#aaa; height:20px; animation:pulse 1.5s infinite; }
@keyframes pulse{ 0%,100%{opacity:.4} 50%{opacity:1} }
.box{
  width:100%; height:100dvh; background:#fff; border-radius:0;
  display:flex; flex-direction:column; overflow:hidden; box-shadow:none;
  border:none; opacity:0; transform:scale(0.9);
  transition:opacity 0.5s, transform 0.5s;
}
.box.show{ opacity:1; transform:scale(1); }
.header{
  background:var(--dark); color:#fff; padding:14px 16px; text-align:center; font-weight:700;
  display:flex; justify-content:space-between; align-items:center; font-size:18px;
  background:linear-gradient(90deg,#0d0d0d,#ff7b00);
}
.header span{ text-shadow:0 0 10px var(--konoha) }
.reset-btn{
  background:#fff2; border:2px solid #fff; padding:6px 12px; border-radius:8px;
  font-size:14px; cursor:pointer; transition:.2s;
}
.reset-btn:hover{ background:#fff4; box-shadow:0 0 10px #fff; }
.help-text{
  background:#fff3cd; color:#856404; padding:10px 14px; font-size:13px; text-align:center;
  border-bottom:2px solid var(--konoha);
}
#chat{
  flex:1; overflow:auto; padding:16px; display:flex; flex-direction:column; gap:12px;
  background:linear-gradient(-45deg,#ff000011,#00ff0011,#0000ff11,#ff000011);
  background-size:400% 400%; animation:chatbg 12s infinite;
}
@keyframes chatbg{
  0%{background-position:0% 50%} 50%{background-position:100% 50%} 100%{background-position:0% 50%}
}
.msg{
  padding:12px 14px; border-radius:14px; max-width:88%; line-height:1.6;
  word-wrap:break-word; position:relative; animation:pop 0.3s; font-size:16px;
}
@keyframes pop{ from{transform:scale(0.8); opacity:0} to{transform:scale(1); opacity:1} }
.msg pre{ background:#0d1117; color:#c9d1d9; padding:12px; border-radius:10px; overflow:auto; font-size:14px }
.msg code{ font-family:ui-monospace,monospace; font-size:0.95em }
.msg table{ border-collapse:collapse; width:100%; font-size:0.95em }
.msg th,.msg td{ border:1px solid #ddd; padding:8px }
.msg img,.msg video{ max-width:100%; border-radius:10px; margin-top:10px; }
.user{background:var(--user); color:#fff; align-self:flex-end; border-bottom-right-radius:4px}
.ai{background:var(--ai); align-self:flex-start; border-bottom-left-radius:4px; border-left:5px solid var(--konoha)}
.rank{
  font-size:11px; background:var(--konoha); color:#fff; padding:3px 8px; border-radius:8px;
  position:absolute; top:-10px; left:10px; font-weight:700;
}
.source{
  font-size:12px; margin-top:10px; padding-top:8px; border-top:1px dashed #ccc;
}
.source a{ color:var(--chakra); text-decoration:none }
.copy-btn{
  position:absolute; top:8px; right:8px; font-size:13px; background:#0002; border:none;
  padding:4px 8px; border-radius:8px; cursor:pointer; opacity:0; transition:.2s;
}
.msg:hover.copy-btn{ opacity:1 }
.speak-btn{
  position:absolute; bottom:8px; right:8px; font-size:13px; background:#0002; border:none;
  padding:4px 8px; border-radius:8px; cursor:pointer; opacity:0; transition:.2s;
}
.msg:hover.speak-btn{ opacity:1 }
.controls{
  display:flex; gap:8px; padding:12px; border-top:3px solid var(--konoha); align-items:end;
}
.input-area{
  flex:1; display:flex; flex-direction:column; gap:6px;
}
textarea{
  width:100%; padding:12px; border-radius:12px; border:2px solid #ccc; resize:none;
  max-height:140px; font-family:inherit; font-size:16px;
}
textarea:focus{ border-color:var(--konoha); outline:none }
.btn-group{
  display:flex; flex-direction:column; gap:8px;
}
button{
  padding:12px 14px; border:none; border-radius:12px; background:var(--user);
  color:white; cursor:pointer; font-weight:700; transition:.2s; font-size:18px;
}
button:hover{ filter:brightness(1.2); box-shadow:0 0 15px var(--konoha) }
button:active{ transform:scale(.9) }
button:disabled{ opacity:.5; cursor:not-allowed; transform:none; box-shadow:none }
.thinking{ animation:pulse 1.5s infinite }
#keyModal{
  position:fixed; top:0; left:0; width:100%; height:100%; background:#000c;
  z-index:10000; display:none; justify-content:center; align-items:center;
}
#keyModal.show{ display:flex; }
.key-box{
  background:#fff; padding:24px; border-radius:14px; max-width:90%; width:420px;
  border:3px solid var(--konoha);
}
.key-box input{
  width:100%; padding:12px; margin:12px 0; border:2px solid #ccc; border-radius:10px; font-size:16px;
}
.file-preview{
  font-size:13px; background:#0001; padding:6px 10px; border-radius:8px; margin:8px 14px;
  display:flex; justify-content:space-between; align-items:center;
}
.voice-recording{
  animation:recordPulse 1s infinite;
  background:var(--fire)!important;
}
@keyframes recordPulse{
  0%,100%{ box-shadow:0 0 0 0 var(--fire) } 50%{ box-shadow:0 0 0 10px transparent }
}
.dropdown{
  position:relative;
}
.dropdown-content{
  display:none; position:absolute; bottom:60px; left:0; background:#fff;
  border:2px solid var(--konoha); border-radius:12px; box-shadow:0 5px 20px #0004;
  min-width:220px; z-index:100;
}
.dropdown-content.show{ display:block; animation:pop 0.2s; }
.dropdown-content button{
  width:100%; text-align:left; background:#fff; color:#111; border-radius:0;
  font-size:15px; padding:12px 14px; border-bottom:1px solid #eee;
}
.dropdown-content button:hover{ background:var(--ai); box-shadow:none; }
.dropdown-content button:last-child{ border-bottom:none; }
.toggle-item{
  display:flex; justify-content:space-between; align-items:center; padding:12px 14px;
  font-size:15px; color:#111; border-bottom:1px solid #eee;
}
.switch{
  position:relative; width:44px; height:24px;
}
.switch input{ opacity:0; width:0; height:0; }
.slider{
  position:absolute; cursor:pointer; top:0; left:0; right:0; bottom:0;
  background:#ccc; transition:.3s; border-radius:24px;
}
.slider:before{
  position:absolute; content:""; height:18px; width:18px; left:3px; bottom:3px;
  background:white; transition:.3s; border-radius:50%;
}
input:checked +.slider{ background:var(--konoha); }
input:checked +.slider:before{ transform:translateX(20px); }
</style>
</head>

<body>
<div id="loadingScreen">
  <div class="loading-content">
    <div class="loading-title" id="loadingTitle"></div>
    <div class="loading-bar-container">
      <div class="loading-bar" id="loadingBar"></div>
    </div>
    <div class="loading-percent" id="loadingPercent">0%</div>
    <div class="loading-status" id="loadingStatus">Menginisialisasi...</div>
  </div>
</div>

<div id="keyModal">
  <div class="key-box">
    <h3>🔑 Masukkan Serper API Key</h3>
    <p style="font-size:14px">Daftar gratis di <a href="https://serper.dev" target="_blank">serper.dev</a> → Copy API Key</p>
    <div style="display:flex; gap:8px; align-items:center;">
      <input type="password" id="apiKeyInput" placeholder="Paste API key kamu di sini" style="flex:1; margin:12px 0;">
      <button onclick="pasteKey()" style="padding:12px; margin:12px 0; background:var(--chakra);" title="Paste dari Clipboard">📋</button>
    </div>
    <button onclick="saveKey()" style="width:100%">⚡ Simpan & Mulai</button>
    <p style="font-size:12px; color:#666; margin-top:12px">Key disimpan di browser kamu aja. Aman! 🍃</p>
  </div>
</div>

<div class="box" id="mainApp">
  <div class="header">
    <span>SMART KONOHA V1🚀</span>
    <button class="reset-btn" onclick="clearChat()" title="Reset Chat">🗑️ Reset</button>
  </div>
  <div class="help-text">
    ⚡kirim = Ngobrol | 🌐 = Cari Google | 🎤 = Voice Input | ⋮ = Semua Fitur
  </div>
  <div id="chat"></div>
  <div id="filePreview"></div>
  <div class="controls">
    <input type="file" id="fileInput" hidden accept=".txt,.pdf,.docx,.csv,.md">
    <input type="file" id="imageInput" hidden accept="image/*">
    <input type="file" id="videoInput" hidden accept="video/*">

    <div class="dropdown">
      <button id="menuBtn" title="Menu Lainnya">⋮</button>
      <div class="dropdown-content" id="dropdownMenu">
        <button onclick="document.getElementById('fileInput').click()">📁 Upload File</button>
        <button onclick="document.getElementById('imageInput').click()">🖼️ Upload Foto</button>
        <button onclick="document.getElementById('videoInput').click()">🎥 Upload Video</button>
        <button onclick="changeApiKey()">🔑 Ganti API Key</button>
        <div class="toggle-item">
          <span>🔊 Auto Baca</span>
          <label class="switch">
            <input type="checkbox" id="autoSpeakToggle" checked>
            <span class="slider"></span>
          </label>
        </div>
      </div>
    </div>

    <button id="browseBtn" title="Cari di Google">🌐</button>

    <div class="input-area">
      <textarea id="text" rows="1" placeholder="Ketik pesan... | 🌐=browsing"></textarea>
    </div>

    <div class="btn-group">
      <button id="voiceBtn" title="Voice Input">🎤</button>
      <button id="sendBtn" title="Kirim Pesan">⚡kirim</button>
    </div>
  </div>
</div>

<script>
// LOADING
const loadingScreen = document.getElementById('loadingScreen');
const loadingTitle = document.getElementById('loadingTitle');
const loadingBar = document.getElementById('loadingBar');
const loadingPercent = document.getElementById('loadingPercent');
const loadingStatus = document.getElementById('loadingStatus');
const mainApp = document.getElementById('mainApp');
const keyModal = document.getElementById('keyModal');

const loadingTexts = [
  'Mengisi chakra... 🍃', 'Load jutsu database... 🔥', 'Sinkronisasi Sharingan... 👁️',
  'Kalibrasi Rasengan... 🌀', 'Connect ke KonohaNet... ⚡', 'Siap tempur! 💥'
];

let progress = 0;
const targetText = 'SMART KONOHA V1🚀';
let currentText = '';

function typeTitle(){
  if(currentText.length < targetText.length){
    currentText += targetText[currentText.length];
    loadingTitle.innerText = currentText;
    setTimeout(typeTitle, 100);
  }
}

function simulateLoading(){
  const interval = setInterval(() => {
    progress += Math.random() * 15;
    if(progress > 100) progress = 100;
    loadingBar.style.width = progress + '%';
    loadingPercent.innerText = Math.floor(progress) + '%';
    const statusIndex = Math.floor((progress / 100) * (loadingTexts.length - 1));
    loadingStatus.innerText = loadingTexts[statusIndex];
    if(progress >= 100){
      clearInterval(interval);
      setTimeout(() => {
        loadingScreen.classList.add('hide');
        checkApiKey();
      }, 500);
    }
  }, 200);
}

window.onload = () => {
  typeTitle();
  setTimeout(simulateLoading, 500);
};

// API KEY HANDLER
function checkApiKey(){
  const savedKey = localStorage.getItem('serper_key');
  if(!savedKey){
    keyModal.classList.add('show');
  } else {
    mainApp.classList.add('show');
    initApp(savedKey);
  }
}

function saveKey(){
  const key = document.getElementById('apiKeyInput').value.trim();
  if(!key) return alert('Isi dulu key-nya shinobi! 🍃');
  localStorage.setItem('serper_key', key);
  keyModal.classList.remove('show');
  mainApp.classList.add('show');
  initApp(key);
}

async function pasteKey(){
  try {
    const text = await navigator.clipboard.readText();
    document.getElementById('apiKeyInput').value = text.trim();
  } catch (err) {
    alert('Gagal akses clipboard 😵 Cek izin browser, atau paste manual Ctrl+V ya!');
  }
}

function changeApiKey(){
  localStorage.removeItem('serper_key');
  location.reload();
}

// MAIN APP
const chat = document.getElementById("chat");
const text = document.getElementById("text");
const sendBtn = document.getElementById("sendBtn");
const browseBtn = document.getElementById("browseBtn");
const voiceBtn = document.getElementById("voiceBtn");
const menuBtn = document.getElementById("menuBtn");
const dropdownMenu = document.getElementById("dropdownMenu");
const fileInput = document.getElementById("fileInput");
const imageInput = document.getElementById("imageInput");
const videoInput = document.getElementById("videoInput");
const filePreview = document.getElementById("filePreview");
const autoSpeakToggle = document.getElementById("autoSpeakToggle");

let SERPER_KEY = '';
let memory = [];
let thinkingInterval = null;
let currentFiles = [];
let recognition = null;
let isRecording = false;

const NINJA_EMOTES = ['🍃','🔥','⚡','🌀','💨','👊','✨','🗡️','🙏','💥'];
const RANKS = ['D-Rank','C-Rank','B-Rank','A-Rank','S-Rank'];

// LOAD MEMORY DARI LOCALSTORAGE 💾
function loadMemory(){
  const saved = localStorage.getItem('konoha_memory');
  if(saved){
    memory = JSON.parse(saved);
    memory.forEach(msg => {
      if(msg.role === 'user'){
        addMsg(msg.content, 'user', false, null, null, false);
      } else {
        addMsg(msg.content, 'ai', true, getRank(msg.content), msg.sources, false);
      }
    });
  }
}

function saveMemory(){
  localStorage.setItem('konoha_memory', JSON.stringify(memory));
}

text.addEventListener('input', () => {
  text.style.height = 'auto';
  text.style.height = Math.min(text.scrollHeight, 140) + 'px';
});

// DROPDOWN MENU
menuBtn.onclick = (e) => {
  e.stopPropagation();
  dropdownMenu.classList.toggle('show');
}

document.addEventListener('click', () => {
  dropdownMenu.classList.remove('show');
});

function getRandomEmote(){ return NINJA_EMOTES[Math.floor(Math.random()*NINJA_EMOTES.length)] }
function getRank(text){
  if(text.length > 500) return 'S-Rank';
  if(text.length > 300) return 'A-Rank';
  if(text.length > 150) return 'B-Rank';
  if(text.length > 50) return 'C-Rank';
  return 'D-Rank';
}

function addMsg(content, type, isHTML = false, rank = null, sources = null, speak = false) {
  const d = document.createElement("div");
  d.className = "msg " + type;
  if (isHTML) d.innerHTML = content;
  else d.innerText = content;
  if (type === 'ai') {
    const rankEl = document.createElement('div');
    rankEl.className = 'rank';
    rankEl.innerText = rank || getRank(content);
    d.appendChild(rankEl);
    if(sources && sources.length > 0){
      const sourceEl = document.createElement('div');
      sourceEl.className = 'source';
      sourceEl.innerHTML = '🌐 Sumber Google: ' + sources.map((s,i) =>
        `<a href="${s.link}" target="_blank">[${i+1}] ${s.title}</a>`
      ).join(' ');
      d.appendChild(sourceEl);
    }
    const copy = document.createElement('button');
    copy.className = 'copy-btn';
    copy.innerText = '📋';
    copy.title = 'Copy';
    copy.onclick = () => navigator.clipboard.writeText(d.innerText);
    d.appendChild(copy);

    const speakBtn = document.createElement('button');
    speakBtn.className = 'speak-btn';
    speakBtn.innerText = '🔊';
    speakBtn.title = 'Bacain lagi';
    speakBtn.onclick = () => speakText(d.innerText);
    d.appendChild(speakBtn);
  }
  chat.appendChild(d);
  chat.scrollTop = chat.scrollHeight;

  if(type === 'ai' && speak && autoSpeakToggle.checked){
    setTimeout(() => speakText(d.innerText), 300);
  }

  return d;
}

function clearChat(){
  if(!confirm('Yakin mau hapus semua chat shinobi? 🍃')) return;
  chat.innerHTML = '';
  memory = [];
  currentFiles = [];
  filePreview.innerHTML = '';
  speechSynthesis.cancel();
  localStorage.removeItem('konoha_memory');
  addMsg("Oke shinobi! 🍃 Chat udah direset. ⚡kirim=ngobrol | 🌐=browsing Google | 🎤=voice | ⋮=menu 🚀", "ai", false, 'S-Rank', null, true);
}

function initApp(key){
  SERPER_KEY = key;
  sendBtn.onclick = () => send(false);
  browseBtn.onclick = () => send(true);
  voiceBtn.onclick = toggleVoice;

  fileInput.onchange = (e) => handleFileUpload(e, 'file');
  imageInput.onchange = (e) => handleFileUpload(e, 'image');
  videoInput.onchange = (e) => handleFileUpload(e, 'video');

  text.addEventListener("keydown", e => {
    if (e.key === "Enter" &&!e.shiftKey) {
      e.preventDefault();
      send(false);
    }
  });

  initVoice();
  loadMemory();

  if(memory.length === 0){
    addMsg("Yosh! SMART KONOHA V1🚀 Ultra siap! 🍃⚡<br><b>⚡kirim</b>=Ngobrol biasa | <b>🌐</b>=Cari Google<br><b>🎤</b>=Voice Input | <b>⋮</b>=Upload File/Foto/Video<br>Chat auto kesimpen 💾 | Auto bacain 🔊", "ai", true, 'S-Rank', null, true);
  }
}

// VOICE INPUT 🎤 - BERFUNGSI PENUH
function initVoice(){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
  if(!SpeechRecognition){
    voiceBtn.disabled = true;
    voiceBtn.title = 'Browser nggak support voice';
    voiceBtn.innerText = '❌';
    return;
  }
  recognition = new SpeechRecognition();
  recognition.lang = 'id-ID';
  recognition.continuous = false;
  recognition.interimResults = true;

  recognition.onstart = () => {
    isRecording = true;
    voiceBtn.classList.add('voice-recording');
    voiceBtn.innerText = '🔴';
    voiceBtn.title = 'Sedang merekam... Klik untuk stop';
  };

  recognition.onresult = (e) => {
    let finalTranscript = '';
    let interimTranscript = '';

    for(let i = e.resultIndex; i < e.results.length; i++){
      const transcript = e.results[i][0].transcript;
      if(e.results[i].isFinal){
        finalTranscript += transcript + ' ';
      } else {
        interimTranscript += transcript;
      }
    }

    if(finalTranscript){
      text.value += (text.value? ' ' : '') + finalTranscript;
      text.style.height = 'auto';
      text.style.height = Math.min(text.scrollHeight, 140) + 'px';
    }
  };

  recognition.onend = () => {
    isRecording = false;
    voiceBtn.classList.remove('voice-recording');
    voiceBtn.innerText = '🎤';
    voiceBtn.title = 'Voice Input';
  };

  recognition.onerror = (e) => {
    console.error(e);
    isRecording = false;
    voiceBtn.classList.remove('voice-recording');
    voiceBtn.innerText = '🎤';
    if(e.error!== 'no-speech'){
      addMsg("⚠️ Voice error shinobi! 🌀 " + e.error, "ai", false, 'D-Rank');
    }
  };
}

function toggleVoice(){
  if(!recognition) return;
  if(isRecording){
    recognition.stop();
  } else {
    speechSynthesis.cancel();
    recognition.start();
  }
}

// TEXT TO SPEECH 🔊
function speakText(textContent){
  speechSynthesis.cancel();
  const cleanText = textContent.replace(/[*_`#\[\]]/g, '').replace(/🍃|🔥|⚡|🌀|💨|👊|✨|🗡️|🙏|💥|🌐|📁|🖼️|🎥|🎤|🔴|📋|🔊|⚡/g, '');
  const utterance = new SpeechSynthesisUtterance(cleanText);
  utterance.lang = 'id-ID';
  utterance.rate = 1.1;
  utterance.pitch = 1;
  speechSynthesis.speak(utterance);
}

// FILE UPLOAD HANDLER
async function handleFileUpload(e, type){
  const file = e.target.files[0];
  if(!file) return;

  const fileObj = {type, file, name: file.name};

  if(type === 'image' || type === 'video'){
    const reader = new FileReader();
    reader.onload = (ev) => {
      fileObj.data = ev.target.result;
      currentFiles.push(fileObj);
      updateFilePreview();
      addMsg(`${getRandomEmote()} File ${type} "${file.name}" siap dikirim! 🍃`, "ai", false, 'B-Rank', null, true);
    };
    reader.readAsDataURL(file);
  } else {
    const reader = new FileReader();
    reader.onload = (ev) => {
      fileObj.content = ev.target.result;
      currentFiles.push(fileObj);
      updateFilePreview();
      addMsg(`${getRandomEmote()} File "${file.name}" udah dibaca! Isi ${fileObj.content.length} karakter 🔥`, "ai", false, 'B-Rank', null, true);
    };
    reader.readAsText(file);
  }

  e.target.value = '';
}

function updateFilePreview(){
  filePreview.innerHTML = currentFiles.map((f,i) =>
    `<div class="file-preview">
      <span>${f.type === 'image'? '🖼️' : f.type === 'video'? '🎥' : '📁'} ${f.name}</span>
      <button onclick="removeFile(${i})" style="padding:3px 8px; font-size:11px">❌</button>
    </div>`
  ).join('');
}

window.removeFile = (index) => {
  currentFiles.splice(index, 1);
  updateFilePreview();
}

async function send(forceBrowse = false) {
  const msg = text.value.trim();
  if ((!msg && currentFiles.length === 0) || sendBtn.disabled) return;

  let userMsg = msg;
  if(currentFiles.length > 0){
    userMsg += '\n\n' + currentFiles.map(f => `[${f.type.toUpperCase()}: ${f.name}]`).join(' ');
  }

  addMsg(userMsg, "user");
  text.value = "";
  text.style.height = 'auto';
  sendBtn.disabled = true;
  browseBtn.disabled = true;
  voiceBtn.disabled = true;
  speechSynthesis.cancel();

  await askAI(msg, forceBrowse);

  currentFiles = [];
  filePreview.innerHTML = '';
  sendBtn.disabled = false;
  browseBtn.disabled = false;
  voiceBtn.disabled = false;
}

// GOOGLE SEARCH VIA SERPER 🔥
async function searchGoogle(query) {
  try {
    const res = await fetch('https://google.serper.dev/search', {
      method: 'POST',
      headers: {
        'X-API-KEY': SERPER_KEY,
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({q: query, num: 5, hl: 'id', gl: 'id'})
    });
    if(!res.ok) throw new Error('Search gagal');
    const data = await res.json();
    const results = [];
    let summary = '';

    if(data.answerBox){
      summary += (data.answerBox.answer || data.answerBox.snippet || data.answerBox.title) + ' ';
      if(data.answerBox.link) results.push({title: data.answerBox.title || 'Jawaban Langsung', link: data.answerBox.link});
    }

    if(data.knowledgeGraph){
      summary += (data.knowledgeGraph.description || '') + ' ';
      if(data.knowledgeGraph.website) results.push({title: data.knowledgeGraph.title, link: data.knowledgeGraph.website});
    }

    if(data.organic){
      data.organic.slice(0,4).forEach(r => {
        summary += r.snippet + ' ';
        results.push({title: r.title, link: r.link});
      });
    }

    return {summary: summary.trim(), sources: results};
  } catch(e){
    console.error(e);
    return null;
  }
}

async function askAI(msg, forceBrowse) {
  document.body.classList.add('thinking');
  const thinkingMsg = addMsg("🧠Sedang Berpikir", "ai thinking");
  let dots = 0;
  thinkingInterval = setInterval(() => {
    dots = (dots + 1) % 4;
    thinkingMsg.innerText = "🧠Sedang Berpikir" + ".".repeat(dots);
  }, 300);

  let searchData = null;
  let fileContext = '';

  // HANDLE FILE UPLOADS
  if(currentFiles.length > 0){
    fileContext = '\n\nFILE YANG DIUPLOAD:\n';
    for(let f of currentFiles){
      if(f.type === 'file' && f.content){
        fileContext += `[FILE: ${f.name}]\n${f.content.substring(0, 3000)}\n\n`;
      } else if(f.type === 'image'){
        fileContext += `[GAMBAR: ${f.name}] User upload foto ini. Analisis isinya. 🖼️\n\n`;
      } else if(f.type === 'video'){
        fileContext += `[VIDEO: ${f.name}] User upload video ini. Jelaskan isinya. 🎥\n\n`;
      }
    }
  }

  try {
    if(forceBrowse){
      clearInterval(thinkingInterval);
      thinkingMsg.innerText = "🌐Browsing Google...";
      thinkingInterval = setInterval(() => {
        dots = (dots + 1) % 4;
        thinkingMsg.innerText = "🌐Browsing Google" + ".".repeat(dots);
      }, 300);
      searchData = await searchGoogle(msg + fileContext);
    }

    clearInterval(thinkingInterval);
    document.body.classList.remove('thinking');
    thinkingMsg.remove();

    let reply = '';
    let sources = [];

    if(searchData && searchData.summary){
      reply = `${getRandomEmote()} Nih hasil investigasi dari Google, shinobi! 🔍💨\n\n${searchData.summary}${fileContext? '\n\n📁 File sudah dianalisis juga!' : ''}\n\n${getRandomEmote()} Data fresh dari KonohaNet! Misi selesai ⚡`;
      sources = searchData.sources;
    } else if(forceBrowse){
      reply = `${getRandomEmote()} Waduh shinobi, KonohaNet lagi gangguan 🌀 Cek API key kamu di serper.dev ya! Atau kuota abis 💨`;
    } else {
      reply = `${getRandomEmote()} ${getOfflineAnswer(msg + fileContext)} ${getRandomEmote()}`;
    }

    const html = marked.parse(reply);
    const rank = getRank(reply);
    addMsg(html, "ai", true, rank, sources, true);
    if(rank === 'S-Rank') confetti({particleCount:100, spread:70, origin:{y:0.8}});

    memory.push({role: "user", content: msg + fileContext});
    memory.push({role: "assistant", content: reply, sources: sources});
    if (memory.length > 40) memory.splice(0, 2);
    saveMemory();

  } catch (e) {
    clearInterval(thinkingInterval);
    document.body.classList.remove('thinking');
    thinkingMsg.remove();
    addMsg("⚠️ Jutsu gagal, shinobi! 🌀 Cek API key atau koneksi kamu ya! Error: " + e.message, "ai", false, 'D-Rank', null, true);
  }
}

function getOfflineAnswer(msg){
  const m = msg.toLowerCase();
  if(m.includes('halo') || m.includes('hai')) return 'Halo juga, shinobi! 🍃🔥 Ada yang bisa Hokage bantu?';
  if(m.includes('siapa kamu')) return 'Aku SMART KONOHA V1🚀! 🍃 Ninja AI yang bisa upload file/foto/video, voice input, auto bacain, auto Google! 💨 Dattebayo!';
  if(m.includes('file') || m.includes('gambar') || m.includes('video')) return 'File kamu sudah kuterima shinobi! 🍃 Klik 🌐 biar aku cariin info lengkapnya di Google! 🔥';
  return 'Klik 🌐 kalau mau aku cariin di Google ya shinobi 🔥 Kalau ngobrol biasa tinggal ⚡kirim aja!';
}
